<div class="h-screen flex bg-gray-50">

  <!-- Sidebar -->
  <aside class="w-60 bg-white border-r border-gray-200 flex flex-col shrink-0">

    <!-- Logo -->
    <div class="px-5 py-5 border-b border-gray-100">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white text-sm">💧</div>
        <div>
          <p class="font-bold text-gray-900 text-sm">AguaAlerta</p>
          <p class="text-xs text-gray-400">Panel admin</p>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-1">

      <a routerLink="/admin" routerLinkActive="bg-blue-50 text-blue-700 font-semibold"
         [routerLinkActiveOptions]="{ exact: true }"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-600
                hover:bg-gray-50 transition-colors">
        <span class="text-base">📊</span> Dashboard
      </a>

      <a routerLink="/admin/reportes" routerLinkActive="bg-blue-50 text-blue-700 font-semibold"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-600
                hover:bg-gray-50 transition-colors">
        <span class="text-base">📋</span> Reportes
      </a>

      <a routerLink="/admin/municipios" routerLinkActive="bg-blue-50 text-blue-700 font-semibold"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-600
                hover:bg-gray-50 transition-colors">
        <span class="text-base">🏛</span> Municipios
      </a>

      <a routerLink="/admin/tipos-problema" routerLinkActive="bg-blue-50 text-blue-700 font-semibold"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-600
                hover:bg-gray-50 transition-colors">
        <span class="text-base">⚙️</span> Tipos de problema
      </a>

      <a routerLink="/admin/oficios" routerLinkActive="bg-blue-50 text-blue-700 font-semibold"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-600
                hover:bg-gray-50 transition-colors">
        <span class="text-base">📄</span> Oficios
      </a>
    </nav>

    <!-- Back to map -->
    <div class="px-3 py-4 border-t border-gray-100">
      <a routerLink="/"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-500
                hover:bg-gray-50 transition-colors">
        <span>🗺</span> Ver mapa público
      </a>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 overflow-auto">
    <router-outlet />
  </main>

</div>
